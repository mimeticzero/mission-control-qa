name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SUPABASE_URL:      https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
  NEXT_PUBLIC_DEMO_MODE:         'true'
  NEXT_TELEMETRY_DISABLED:       '1'

jobs:
  # ── Quality: type-check + lint ────────────────────────────────────────────────
  quality:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint

  # ── Build once, tar it up, upload artifact ────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Archive build output
        run: |
          echo "=== build output ==="
          find .next -maxdepth 2 -not -path '*/.next/cache*' | head -30
          echo "=== file count (excl cache) ==="
          find .next -type f -not -path '*/.next/cache*' | wc -l
          echo "=== creating tar ==="
          tar -czf nextjs-build.tar.gz --exclude='.next/cache' .next/
          ls -lh nextjs-build.tar.gz
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: nextjs-build.tar.gz
          if-no-files-found: error
          retention-days: 1

  # ── Playwright E2E — download shared artifact ─────────────────────────────────
  e2e:
    name: E2E — ${{ matrix.browser }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os:      [ubuntu-latest, macos-latest]
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
      - name: Extract build
        run: tar -xzf nextjs-build.tar.gz && ls -la .next/
      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.os }}-${{ matrix.browser }}-${{ github.sha }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
